<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warung Palu — Cita Rasa Tanah Kaili</title>

  <!-- Favicon: ikon di tab browser -->
  <link rel="icon" type="image/png" href="assets/icons/logo.png" />
  <link rel="apple-touch-icon" href="assets/icons/logo.png" />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <div class="bg-pattern"></div>

  <main class="login-wrapper">

    <!-- Brand -->
    <div class="brand-header">
      <div class="brand-logo">
        <img src="assets/icons/logo.png" alt="Logo"
             onload="this.nextElementSibling.style.display='none'"
             onerror="this.style.display='none'" />
        <span class="logo-fallback">WP</span>
      </div>
      <h1 class="brand-name">Warung Palu</h1>
      <p class="brand-tagline">Cita Rasa Asli Tanah Kaili</p>
    </div>

    <!-- Login Cards -->
    <div class="login-cards">

      <!-- Pelanggan Card -->
      <div class="login-card card-customer" id="cardCustomer">
        <div class="card-label">Pelanggan</div>
        <h2>Saya Pelanggan</h2>
        <p>Masukkan nomor meja untuk mulai memesan</p>
        <div class="input-group">
          <label>Nomor Meja</label>
          <input type="number" id="tableNumber" placeholder="Contoh: 5" min="1" max="50" />
        </div>
        <div class="input-group">
          <label>Nama (Opsional)</label>
          <input type="text" id="customerName" placeholder="Nama Anda" />
        </div>
        <button class="btn-primary" onclick="loginCustomer()">
          Mulai Pesan
        </button>
      </div>

      <!-- Divider -->
      <div class="card-divider">
        <span>atau</span>
      </div>

      <!-- Kasir Card -->
      <div class="login-card card-cashier" id="cardCashier">
        <div class="card-label">Kasir</div>
        <h2>Kasir / Admin</h2>
        <p>Login dengan akun kasir untuk mengelola pesanan</p>
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="cashierUser" placeholder="admin" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="cashierPass" placeholder="••••••••" />
        </div>
        <button class="btn-secondary" onclick="loginCashier()">
          Masuk sebagai Kasir
        </button>
        <p class="hint-text">Demo: username <b>admin</b> / password <b>admin123</b></p>
      </div>

    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
